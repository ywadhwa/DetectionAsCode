title: Web Shell Upload Detection
id: 52345678-1234-1234-1234-123456789012
status: experimental
description: Detects potential web shell file uploads to web servers
references:
    - https://attack.mitre.org/techniques/T1505/003/
author: Detection as Code Pipeline
date: 2024/01/01
modified: 2024/01/01
tags:
    - attack.persistence
    - attack.t1505.003
    - web.webshell
logsource:
    product: webserver
    category: http_access
detection:
    selection:
        c-uri|contains:
            - '.php'
            - '.jsp'
            - '.asp'
            - '.aspx'
        c-uri|re: '.*(upload|file|uploader|shell|cmd|exec).*'
        status_code: 200
    condition: selection
falsepositives:
    - Legitimate file upload functionality
    - CMS plugin installations
level: high
