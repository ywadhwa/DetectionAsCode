title: Suspicious DNS Query Patterns
id: 42345678-1234-1234-1234-123456789012
status: experimental
description: Detects suspicious DNS query patterns that may indicate data exfiltration or C2 communication
references:
    - https://attack.mitre.org/techniques/T1071/004/
author: Detection as Code Pipeline
date: 2024/01/01
modified: 2024/01/01
tags:
    - attack.command_and_control
    - attack.t1071.004
    - network.dns
logsource:
    product: dns
    category: dns_query
detection:
    selection:
        query|re: '^[a-z0-9]{32,}\.(com|net|org|io)$'  # Long subdomain patterns
        query|contains:
            - '.tk'
            - '.ml'
            - '.ga'
            - '.cf'
    condition: selection
falsepositives:
    - Legitimate CDN services
    - Dynamic DNS services
level: medium
