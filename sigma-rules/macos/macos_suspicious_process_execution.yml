title: macOS Suspicious Process Execution
id: 32345678-1234-1234-1234-123456789012
status: experimental
description: Detects suspicious process execution patterns on macOS systems
references:
    - https://attack.mitre.org/techniques/T1059/
author: Detection as Code Pipeline
date: 2024/01/01
modified: 2024/01/01
tags:
    - attack.execution
    - attack.t1059
    - os.macos
logsource:
    product: macos
    category: process_creation
detection:
    selection:
        process_path|contains:
            - '/tmp/'
            - '/var/tmp/'
            - '/private/var/tmp/'
        process_name|re: '\.(sh|py|pl|rb)$'
    condition: selection
falsepositives:
    - Legitimate development scripts
    - System maintenance tasks
level: medium
