name: Detection as Code Pipeline

on:
  push:
    branches: [ master, dev, staging ]
    paths:
      - 'sigma-rules/**'
      - '.github/workflows/dac-pipeline.yml'
  pull_request:
    branches: [ master, dev, staging ]
    paths:
      - 'sigma-rules/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run pipeline on'
        required: false
        default: 'dev'

jobs:
  lint-sigma-rules:
    name: Lint Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Sigma CLI
        run: |
          pip install sigmatools
          pip install ruamel.yaml

      - name: Lint Sigma rules
        run: |
          echo "Linting all Sigma rules..."
          find sigma-rules -name "*.yml" -o -name "*.yaml" | while read file; do
            echo "Checking: $file"
            sigma lint "$file" || exit 1
          done

      - name: Validate Sigma rule syntax
        run: |
          echo "Validating Sigma rule syntax..."
          python scripts/validate_sigma_syntax.py

      - name: Validate file naming conventions
        run: |
          echo "Validating file naming conventions..."
          python scripts/validate_file_naming.py

  convert-to-queries:
    name: Convert Sigma to Queries
    runs-on: ubuntu-latest
    needs: lint-sigma-rules
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install sigmatools
          pip install ruamel.yaml
          pip install pyyaml

      - name: Convert to Splunk queries
        run: |
          echo "Converting Sigma rules to Splunk queries..."
          python scripts/convert_sigma.py --backend splunk --output output/splunk

      - name: Convert to KQL queries
        run: |
          echo "Converting Sigma rules to KQL queries..."
          python scripts/convert_sigma.py --backend kql --output output/kql

      - name: Validate Splunk queries
        run: |
          echo "Validating Splunk query syntax..."
          python scripts/validate_queries.py --type splunk --directory output/splunk || echo "Splunk validation requires Splunk SDK (optional)"

      - name: Validate KQL queries
        run: |
          echo "Validating KQL query syntax..."
          python scripts/validate_queries.py --type kql --directory output/kql || echo "KQL validation requires Azure SDK (optional)"

      - name: Upload query artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: generated-queries
          path: |
            output/splunk/**
            output/kql/**
          retention-days: 30

  generate-report:
    name: Generate Detection Report
    runs-on: ubuntu-latest
    needs: [lint-sigma-rules, convert-to-queries]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate detection report
        run: |
          python scripts/generate_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detection-report
          path: output/report.md
          retention-days: 30

  test-splunk-queries:
    name: Test Splunk Queries
    runs-on: ubuntu-latest
    needs: convert-to-queries
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start Splunk test environment
        run: |
          cd docker
          docker-compose up -d
          echo "Waiting for Splunk to be ready..."
          timeout 300 bash -c 'until docker-compose exec -T splunk curl -f http://localhost:8000; do sleep 10; done' || true

      - name: Load test data
        run: |
          cd docker
          docker-compose --profile init up splunk-init || true
          sleep 30  # Give Splunk time to index data

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests urllib3

      - name: Test Splunk queries
        run: |
          python scripts/test_splunk_queries.py \
            --host localhost \
            --port 8089 \
            --username admin \
            --password ChangeMe123! \
            --index test_data || echo "Query testing completed with some failures"

      - name: Stop Splunk
        if: always()
        run: |
          cd docker
          docker-compose down -v
