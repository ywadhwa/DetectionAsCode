name: Deployment Pipeline

on:
  push:
    tags:
      - 'release-*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Build matrix
        id: matrix
        run: |
          matrix=$(python scripts/build_deploy_matrix.py)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: build-matrix
    strategy:
      matrix: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Deploy
        env:
          SENTINEL_TOKEN: ${{ secrets.SENTINEL_TOKEN }}
          SENTINEL_WORKSPACE_ID: ${{ secrets.SENTINEL_WORKSPACE_ID }}
          SPLUNK_HOST: ${{ secrets.SPLUNK_HOST }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
        run: |
          if [ "${{ matrix.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          else
            DRY_RUN_FLAG=""
          fi
          python scripts/deploy.py \
            --platform "${{ matrix.platform }}" \
            --content-pack "${{ matrix.content_pack }}" \
            --action "${{ matrix.action }}" \
            $DRY_RUN_FLAG

  release-notes:
    runs-on: ubuntu-latest
    needs: build-matrix
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Generate release notes
        run: |
          python scripts/generate_release_notes.py

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: documentation/release-notes.md
