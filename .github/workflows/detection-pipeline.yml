name: Detection as Code Pipeline

on:
  push:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
  pull_request:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Sigma rules
        run: |
          echo "Checking all Sigma rules..."
          sigma check sigma-rules/

      - name: Validate Sigma rule syntax
        run: python scripts/validate_sigma_syntax.py

      - name: Validate file naming conventions
        run: python scripts/validate_file_naming.py

      - name: Validate rule metadata
        run: python scripts/validate_rule_metadata.py

      - name: Validate detection quality
        run: python scripts/validate_detection_quality.py

      - name: Validate schemas
        run: python scripts/validate_schema.py

      - name: Validate references
        run: python scripts/validate_links.py

      - name: Validate spelling
        run: python scripts/validate_spelling.py

      - name: Validate repository structure
        run: python scripts/validate_repo_structure.py

      - name: Run unit tests
        run: pytest -q

      - name: Validate versioning (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          export BASE_REF="${{ github.base_ref }}"
          python scripts/validate_versions.py

  convert:
    name: Convert Sigma to Queries
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert to Splunk queries
        run: |
          echo "Converting Sigma rules to Splunk queries..."
          python scripts/convert_sigma.py --backend splunk --output output/splunk --artifact-output output/artifacts/conversion-splunk.json

      - name: Convert to KQL queries
        run: |
          echo "Converting Sigma rules to KQL queries..."
          python scripts/convert_sigma.py --backend kql --output output/kql --artifact-output output/artifacts/conversion-kql.json

      - name: Validate Splunk queries
        run: |
          echo "Validating Splunk query syntax..."
          manifest=$(find output -name "conversion_manifest.splunk.json" 2>/dev/null | head -1)
          if [ -n "$manifest" ]; then
            python scripts/validate_queries.py --type splunk --directory output/splunk --manifest "$manifest" --artifact-output output/artifacts/validation-splunk.json || echo "Splunk validation requires Splunk SDK (optional)"
          else
            python scripts/validate_queries.py --type splunk --directory output/splunk --artifact-output output/artifacts/validation-splunk.json || echo "Splunk validation requires Splunk SDK (optional)"
          fi

      - name: Validate KQL queries
        run: |
          echo "Validating KQL query syntax..."
          manifest=$(find output -name "conversion_manifest.kql.json" 2>/dev/null | head -1)
          if [ -n "$manifest" ]; then
            python scripts/validate_queries.py --type kql --directory output/kql --manifest "$manifest" --artifact-output output/artifacts/validation-kql.json || echo "KQL validation requires Azure SDK (optional)"
          else
            python scripts/validate_queries.py --type kql --directory output/kql --artifact-output output/artifacts/validation-kql.json || echo "KQL validation requires Azure SDK (optional)"
          fi

      - name: Upload query artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-queries
          path: output/
          retention-days: 30

  report:
    name: Generate Detection Report
    runs-on: ubuntu-latest
    needs: convert
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate detection report
        run: python scripts/generate_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: detection-report
          path: output/report.md
          retention-days: 30

  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: report
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/dev/')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate docs and changelog
        run: |
          python scripts/generate_docs.py
          python scripts/generate_changelog.py

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: documentation/
          retention-days: 30
