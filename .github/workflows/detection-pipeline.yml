name: Detection as Code Pipeline

on:
  push:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
  pull_request:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Sigma rules
        run: |
          echo "Checking all Sigma rules..."
          sigma check sigma-rules/

      - name: Validate Sigma rule syntax
        run: python scripts/validate_sigma_syntax.py

      - name: Validate file naming conventions
        run: python scripts/validate_file_naming.py

      - name: Validate rule metadata
        run: python scripts/validate_rule_metadata.py

      - name: Validate detection quality
        run: python scripts/validate_detection_quality.py

      - name: Validate schemas
        run: python scripts/validate_schema.py

      - name: Validate references
        run: python scripts/validate_links.py

      - name: Validate spelling
        run: python scripts/validate_spelling.py

      - name: Validate repository structure
        run: python scripts/validate_repo_structure.py

      - name: Run unit tests
        run: pytest -q

      - name: Validate versioning (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          export BASE_REF="${{ github.base_ref }}"
          python scripts/validate_versions.py

  convert:
    name: Convert Sigma to Elasticsearch
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Convert to Elasticsearch queries
        run: |
          echo "Converting Sigma rules to Elasticsearch queries..."
          python scripts/convert_sigma.py --backend elasticsearch --output output/elasticsearch --artifact-output output/artifacts/conversion-elasticsearch.json

      - name: Upload query artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-queries
          path: output/
          retention-days: 30

  test-elasticsearch:
    name: Test Elasticsearch Queries
    runs-on: ubuntu-latest
    needs: convert
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
          --health-start-period 60s

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Elasticsearch
        run: |
          echo "Waiting for Elasticsearch to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'; then
              echo "Elasticsearch is ready!"
              break
            fi
            echo "Waiting for Elasticsearch... (attempt $i/30)"
            sleep 5
          done

      - name: Load test data into Elasticsearch
        run: |
          chmod +x docker/init-scripts/load-elastic-test-data.sh
          ELASTIC_HOST=localhost ELASTIC_PORT=9200 docker/init-scripts/load-elastic-test-data.sh

      - name: Validate Elasticsearch queries (compile)
        run: |
          echo "Validating Elasticsearch query syntax..."
          python scripts/test_elastic_queries.py \
            --host http://localhost:9200 \
            --index security-events \
            --mode compile \
            --directory output/elasticsearch \
            --artifact-output output/artifacts/validation-elasticsearch.json

      - name: Test Elasticsearch queries (execute)
        run: |
          echo "Executing Elasticsearch queries against test data..."
          python scripts/test_elastic_queries.py \
            --host http://localhost:9200 \
            --index security-events \
            --mode execute \
            --directory output/elasticsearch \
            --expectations tests/expected_matches.yml \
            --artifact-output output/artifacts/test-elasticsearch.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elasticsearch-test-results
          path: output/artifacts/
          retention-days: 30

  report:
    name: Generate Detection Report
    runs-on: ubuntu-latest
    needs: test-elasticsearch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate detection report
        run: python scripts/generate_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: detection-report
          path: output/report.md
          retention-days: 30

  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: report
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate docs and changelog
        run: |
          python scripts/generate_docs.py
          python scripts/generate_changelog.py

      - name: Commit documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add documentation/
          if git diff --staged --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: Auto-update documentation [skip ci]"
            git push
          fi
