name: Detection as Code Pipeline

on:
  push:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
      - 'scripts/**'
      - 'docker/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'constraints-ci.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main, 'dev/*']
    paths:
      - 'sigma-rules/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'
permissions:
  contents: read

jobs:
  lint:
    name: Lint Sigma Rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints-ci.txt

      - name: Check Sigma rules
        run: |
          echo "Checking all Sigma rules..."
          sigma check sigma-rules/

      - name: Validate Sigma rule syntax
        run: python scripts/validate_sigma_syntax.py

      - name: Validate file naming conventions
        run: python scripts/validate_file_naming.py

      - name: Validate rule metadata
        run: python scripts/validate_rule_metadata.py

      - name: Validate detection quality
        run: python scripts/validate_detection_quality.py

      - name: Validate schemas
        run: python scripts/validate_schema.py

      - name: Validate references
        run: python scripts/validate_links.py

      - name: Validate spelling
        run: python scripts/validate_spelling.py

      - name: Validate repository structure
        run: python scripts/validate_repo_structure.py

      - name: Run unit tests
        run: pytest -q

      - name: Validate versioning (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          export BASE_REF="${{ github.base_ref }}"
          python scripts/validate_versions.py

  convert:
    name: Convert Sigma to Elasticsearch
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints-ci.txt

      - name: Convert to Elasticsearch queries
        run: |
          echo "Converting Sigma rules to Elasticsearch queries..."
          bundle_ts="$(date -u +%Y%m%d_%H%M%S)"
          python scripts/convert_sigma.py \
            --backend elasticsearch \
            --output output/elasticsearch \
            --artifact-output output/artifacts/conversion-elasticsearch.json \
            --bundle-output "output/elasticsearch/elasticsearch_bundle_${bundle_ts}_${GITHUB_RUN_ID}.json"

      - name: Upload query artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-queries
          path: output/
          retention-days: 30

  test-elasticsearch:
    name: Test Elasticsearch Queries
    runs-on: ubuntu-latest
    needs: convert
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        env:
          discovery.type: single-node
          xpack.security.enabled: false
          ES_JAVA_OPTS: -Xms512m -Xmx512m
        ports:
          - 9200:9200

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints-ci.txt

      - name: Wait for Elasticsearch
        run: |
          echo "Waiting for Elasticsearch to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green"\|"status":"yellow"'; then
              echo "Elasticsearch is ready!"
              break
            fi
            echo "Waiting for Elasticsearch... (attempt $i/30)"
            sleep 5
          done

      - name: Load test data into Elasticsearch
        run: |
          chmod +x docker/init-scripts/load-elastic-test-data.sh
          export FIXTURES_DIR="${GITHUB_WORKSPACE}/tests/fixtures"
          ELASTIC_HOST=localhost ELASTIC_PORT=9200 docker/init-scripts/load-elastic-test-data.sh

      - name: Validate Elasticsearch queries (compile)
        run: |
          echo "Validating Elasticsearch query syntax..."
          python scripts/test_elastic_queries.py \
            --host http://localhost:9200 \
            --index security-events \
            --mode compile \
            --directory output/elasticsearch \
            --artifact-output output/artifacts/validation-elasticsearch.json

      - name: Test Elasticsearch queries (execute)
        run: |
          echo "Executing Elasticsearch queries against test data..."
          python scripts/test_elastic_queries.py \
            --host http://localhost:9200 \
            --index security-events \
            --mode execute \
            --directory output/elasticsearch \
            --expectations tests/expected_matches.yml \
            --artifact-output output/artifacts/test-elasticsearch.json

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: elasticsearch-test-results
          path: output/artifacts/
          retention-days: 30

  report:
    name: Generate Detection Report
    runs-on: ubuntu-latest
    needs: test-elasticsearch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Download query artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-queries
          path: output/

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints-ci.txt

      - name: Generate detection report
        run: python scripts/generate_report.py

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: detection-report
          path: output/report.md
          retention-days: 30

  docs:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: report
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -c constraints-ci.txt

      - name: Generate docs and changelog
        run: |
          python scripts/generate_docs.py
          python scripts/generate_changelog.py

      - name: Commit documentation
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add documentation/
          if git diff --staged --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: Auto-update documentation [skip ci]"
            git push
          fi

  run-summary:
    name: Workflow Run Summary
    runs-on: ubuntu-latest
    needs: [lint, convert, test-elasticsearch, report, docs]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: run-artifacts
          pattern: '*'
          merge-multiple: true
          if-no-files-found: ignore

      - name: Generate run summary
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          CONVERT_RESULT: ${{ needs.convert.result }}
          TEST_RESULT: ${{ needs.test-elasticsearch.result }}
          REPORT_RESULT: ${{ needs.report.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
          RUN_ARTIFACTS_DIR: run-artifacts
        run: |
          python - <<'PY'
          import glob
          import json
          import os

          artifacts_dir = os.environ.get("RUN_ARTIFACTS_DIR", "run-artifacts")
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]

          def first_by_name(name: str):
              matches = glob.glob(f"{artifacts_dir}/**/{name}", recursive=True)
              if not matches:
                  return None
              with open(matches[0], encoding="utf-8") as f:
                  return json.load(f)

          conversion = first_by_name("conversion-elasticsearch.json") or {}
          validation = first_by_name("validation-elasticsearch.json") or {}
          execution = first_by_name("test-elasticsearch.json") or {}

          lines = []
          lines.append("# Detection as Code CI Run Summary")
          lines.append("")
          lines.append("## Job status")
          lines.append(f"- `lint`: {os.environ.get('LINT_RESULT', 'unknown')}")
          lines.append(f"- `convert`: {os.environ.get('CONVERT_RESULT', 'unknown')}")
          lines.append(f"- `test-elasticsearch`: {os.environ.get('TEST_RESULT', 'unknown')}")
          lines.append(f"- `report`: {os.environ.get('REPORT_RESULT', 'unknown')}")
          lines.append(f"- `docs`: {os.environ.get('DOCS_RESULT', 'unknown')}")
          lines.append("")

          if conversion:
              cm = conversion.get("metrics", {})
              lines.append("## Conversion (Elasticsearch)")
              lines.append(f"- status: `{conversion.get('status', 'unknown')}`")
              lines.append(f"- processed_rules: `{cm.get('processed_rules', 0)}`")
              lines.append(f"- generated: `{cm.get('generated_count', 0)}`")
              lines.append(f"- skipped: `{cm.get('skipped_count', 0)}`")
              lines.append(f"- failed: `{cm.get('failed_count', 0)}`")
              lines.append("")

          if validation:
              vm = validation.get("metrics", {})
              lines.append("## Elasticsearch compile check")
              lines.append(f"- status: `{validation.get('status', 'unknown')}`")
              lines.append(f"- files_checked: `{vm.get('files_checked', 0)}`")
              lines.append(f"- passed: `{vm.get('passed', 0)}`")
              lines.append(f"- failed: `{vm.get('failed', 0)}`")
              lines.append("")

          if execution:
              em = execution.get("metrics", {})
              lines.append("## Elasticsearch execution check")
              lines.append(f"- status: `{execution.get('status', 'unknown')}`")
              lines.append(f"- files_checked: `{em.get('files_checked', 0)}`")
              lines.append(f"- passed: `{em.get('passed', 0)}`")
              lines.append(f"- failed: `{em.get('failed', 0)}`")
              lines.append("")
              rows = execution.get("artifacts", {}).get("results", [])
              if rows:
                  lines.append("### Match counts")
                  for item in rows:
                      qf = item.get("query_file", "<unknown>")
                      stage = item.get("stages", {}).get("execution", {})
                      matches = stage.get("row_count", 0)
                      status = stage.get("status", "unknown")
                      lines.append(f"- `{qf}`: matches=`{matches}`, status=`{status}`")
                  lines.append("")

          if not conversion and not validation and not execution:
              lines.append("No JSON artifacts were found for conversion/testing in this run.")

          with open(summary_path, "a", encoding="utf-8") as out:
              out.write("\n".join(lines) + "\n")
          PY
