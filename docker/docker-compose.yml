version: '3.8'

services:
  # Elasticsearch for query testing
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: dac-elasticsearch-test
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
    networks:
      - dac-network

  elasticsearch-init:
    image: curlimages/curl:latest
    container_name: dac-elasticsearch-init
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./init-scripts:/scripts:ro
    entrypoint: /bin/sh
    command: /scripts/load-elastic-test-data.sh
    networks:
      - dac-network
    profiles:
      - init

  # Splunk for query testing (optional)
  splunk:
    image: splunk/splunk:latest
    container_name: dac-splunk-test
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=${SPLUNK_PASSWORD:-changeme}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-changeme}
    ports:
      - "8000:8000"  # Web UI
      - "8088:8088"  # HEC (HTTP Event Collector)
      - "8089:8089"  # Management port
    volumes:
      - splunk-data:/opt/splunk/var/lib/splunk
      - splunk-etc:/opt/splunk/etc
      - ./test-data:/opt/splunk/test-data:ro
      - ../output/splunk:/opt/splunk/queries:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - dac-network
    profiles:
      - splunk

  splunk-init:
    image: curlimages/curl:latest
    container_name: dac-splunk-init
    depends_on:
      splunk:
        condition: service_healthy
    volumes:
      - ./init-scripts:/scripts:ro
    entrypoint: /bin/sh
    command: -c "sleep 60 && /scripts/load-test-data.sh || true"
    networks:
      - dac-network
    profiles:
      - splunk-init

volumes:
  elasticsearch-data:
  splunk-data:
  splunk-etc:

networks:
  dac-network:
    driver: bridge
