# Stage template for generating documentation
parameters:
  pythonVersion: '3.11'
  dependsOn: Report

stages:
  - stage: Docs
    displayName: 'Generate Documentation'
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/heads/dev/'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - job: GenerateDocs
        displayName: 'Generate Documentation'
        steps:
          - checkout: self

          - template: ../jobs/python-setup.yml
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}

          - script: pip install -r requirements.txt
            displayName: 'Install dependencies'

          - script: |
              python scripts/generate_docs.py
              python scripts/generate_changelog.py
            displayName: 'Generate docs and changelog'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish documentation'
            inputs:
              targetPath: 'documentation'
              artifactName: 'documentation'
              publishLocation: 'pipeline'
