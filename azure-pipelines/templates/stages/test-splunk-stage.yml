# Stage template for testing Splunk queries
parameters:
  pythonVersion: '3.11'
  dependsOn: Convert
  splunkHost: 'localhost'
  splunkPort: '8089'
  splunkUsername: 'admin'
  splunkPassword: ''
  splunkIndex: 'test_data'

stages:
  - stage: TestSplunk
    displayName: 'Test Splunk Queries'
    dependsOn: ${{ parameters.dependsOn }}
    condition: and(succeeded(), or(startsWith(variables['Build.SourceBranch'], 'refs/heads/dev/'), eq(variables['Build.SourceBranch'], 'refs/heads/main')))
    jobs:
      - job: TestSplunkQueries
        displayName: 'Test Splunk Queries'
        steps:
          - checkout: self

          - task: DownloadPipelineArtifact@2
            displayName: 'Download query artifacts'
            inputs:
              artifactName: 'generated-queries'
              targetPath: 'output'

          - script: |
              cd docker
              docker-compose up -d
              echo "Waiting for Splunk to be ready..."
              for i in $(seq 1 30); do
                if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200\|302"; then
                  echo "Splunk is ready!"
                  break
                fi
                echo "Waiting for Splunk... (attempt $i/30)"
                sleep 10
              done
            displayName: 'Start Splunk test environment'

          - script: |
              cd docker
              docker-compose --profile init up splunk-init || echo "Init container may have already run"
              sleep 30
              echo "Test data loaded"
            displayName: 'Load test data'

          - template: ../jobs/python-setup.yml
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}

          - script: |
              pip install requests urllib3 pyyaml
              pip install -r requirements.txt
            displayName: 'Install test dependencies'

          - script: |
              python scripts/test_splunk_queries.py \
                --host ${{ parameters.splunkHost }} \
                --port ${{ parameters.splunkPort }} \
                --username ${{ parameters.splunkUsername }} \
                --password ${{ parameters.splunkPassword }} \
                --index ${{ parameters.splunkIndex }} \
                --expectations tests/expected_matches.yml || echo "Query testing completed with some failures"
            displayName: 'Test Splunk queries'

          - script: |
              cd docker
              docker-compose down -v
            displayName: 'Stop Splunk'
            condition: always()
