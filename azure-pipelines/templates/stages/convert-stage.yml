# Stage template for converting Sigma rules to queries
parameters:
  pythonVersion: '3.11'
  dependsOn: Lint

stages:
  - stage: Convert
    displayName: 'Convert Sigma to Queries'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - job: ConvertToQueries
        displayName: 'Convert Sigma to Queries'
        steps:
          - template: ../jobs/python-setup.yml
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}

          - template: ../jobs/install-dependencies.yml
            parameters:
              packages: 'sigmatools ruamel.yaml pyyaml'

          - script: pip install -r requirements.txt
            displayName: 'Install repo dependencies'

          - script: |
              echo "Converting Sigma rules to Splunk queries..."
              python scripts/convert_sigma.py --backend splunk --output output/splunk --artifact-output output/artifacts/conversion-splunk.json
            displayName: 'Convert to Splunk queries'

          - script: |
              echo "Converting Sigma rules to KQL queries..."
              python scripts/convert_sigma.py --backend kql --output output/kql --artifact-output output/artifacts/conversion-kql.json
            displayName: 'Convert to KQL queries'

          - script: |
              echo "Validating Splunk query syntax..."
              manifest=$(find output -name "conversion_manifest.splunk.json" 2>/dev/null | head -1)
              if [ -n "$manifest" ]; then
                python scripts/validate_queries.py --type splunk --directory output/splunk --manifest "$manifest" --artifact-output output/artifacts/validation-splunk.json || echo "Splunk validation requires Splunk SDK (optional)"
              else
                python scripts/validate_queries.py --type splunk --directory output/splunk --artifact-output output/artifacts/validation-splunk.json || echo "Splunk validation requires Splunk SDK (optional)"
              fi
            displayName: 'Validate Splunk queries'

          - script: |
              echo "Validating KQL query syntax..."
              manifest=$(find output -name "conversion_manifest.kql.json" 2>/dev/null | head -1)
              if [ -n "$manifest" ]; then
                python scripts/validate_queries.py --type kql --directory output/kql --manifest "$manifest" --artifact-output output/artifacts/validation-kql.json || echo "KQL validation requires Azure SDK (optional)"
              else
                python scripts/validate_queries.py --type kql --directory output/kql --artifact-output output/artifacts/validation-kql.json || echo "KQL validation requires Azure SDK (optional)"
              fi
            displayName: 'Validate KQL queries'

          - task: PublishPipelineArtifact@1
            displayName: 'Upload query artifacts'
            condition: always()
            inputs:
              targetPath: 'output'
              artifactName: 'generated-queries'
              publishLocation: 'pipeline'
