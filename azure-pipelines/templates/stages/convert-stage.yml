# Stage template for converting Sigma rules to queries
parameters:
  pythonVersion: '3.11'
  pool:
    name: Default
    demands:
      - Agent.OS -equals Windows_NT
  dependsOn: Lint

stages:
  - stage: Convert
    displayName: 'Convert Sigma to Queries'
    dependsOn: ${{ parameters.dependsOn }}
    pool: ${{ parameters.pool }}
    jobs:
      - job: ConvertToQueries
        displayName: 'Convert Sigma to Queries'
        steps:
          - template: ../jobs/python-setup.yml
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}

          - template: ../jobs/install-dependencies.yml
            parameters:
              packages: 'sigmatools ruamel.yaml pyyaml'

          - task: PowerShell@2
            displayName: 'Install repo dependencies'
            inputs:
              targetType: 'inline'
              script: |
                pip install -r requirements.txt

          - task: PowerShell@2
            displayName: 'Convert to Splunk queries'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Converting Sigma rules to Splunk queries..."
                python scripts/convert_sigma.py --backend splunk --output output/splunk --artifact-output output/artifacts/conversion-splunk.json

          - task: PowerShell@2
            displayName: 'Convert to KQL queries'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Converting Sigma rules to KQL queries..."
                python scripts/convert_sigma.py --backend kql --output output/kql --artifact-output output/artifacts/conversion-kql.json

          - task: PowerShell@2
            displayName: 'Validate Splunk queries'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Validating Splunk query syntax..."
                $manifest = Get-ChildItem -Path output -Recurse -Filter "conversion_manifest.splunk.json" -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($manifest) {
                  python scripts/validate_queries.py --type splunk --directory output/splunk --manifest "$($manifest.FullName)" --artifact-output output/artifacts/validation-splunk.json
                } else {
                  python scripts/validate_queries.py --type splunk --directory output/splunk --artifact-output output/artifacts/validation-splunk.json
                }
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "Splunk validation requires Splunk SDK (optional)"
                }

          - task: PowerShell@2
            displayName: 'Validate KQL queries'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Validating KQL query syntax..."
                $manifest = Get-ChildItem -Path output -Recurse -Filter "conversion_manifest.kql.json" -ErrorAction SilentlyContinue | Select-Object -First 1
                if ($manifest) {
                  python scripts/validate_queries.py --type kql --directory output/kql --manifest "$($manifest.FullName)" --artifact-output output/artifacts/validation-kql.json
                } else {
                  python scripts/validate_queries.py --type kql --directory output/kql --artifact-output output/artifacts/validation-kql.json
                }
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "KQL validation requires Azure SDK (optional)"
                }

          - task: PublishPipelineArtifact@1
            displayName: 'Upload query artifacts'
            condition: always()
            inputs:
              targetPath: 'output'
              artifactName: 'generated-queries'
              publishLocation: 'pipeline'
