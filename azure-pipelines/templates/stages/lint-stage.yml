# Stage template for linting Sigma rules
parameters:
  pythonVersion: '3.11'

stages:
  - stage: Lint
    displayName: 'Lint Sigma Rules'
    jobs:
      - job: LintSigmaRules
        displayName: 'Lint Sigma Rules'
        steps:
          - template: ../jobs/python-setup.yml
            parameters:
              pythonVersion: ${{ parameters.pythonVersion }}

          - script: |
              python -m pip install --upgrade pip
              pip install sigmatools ruamel.yaml pyyaml
              pip install -r requirements.txt
            displayName: 'Install Sigma CLI'

          - script: |
              echo "Linting all Sigma rules..."
              find sigma-rules -name "*.yml" -o -name "*.yaml" | while read file; do
                echo "Checking: $file"
                sigma lint "$file" || exit 1
              done
            displayName: 'Lint Sigma rules'

          - script: |
              echo "Validating Sigma rule syntax..."
              python scripts/validate_sigma_syntax.py
            displayName: 'Validate Sigma rule syntax'

          - script: |
              echo "Validating file naming conventions..."
              python scripts/validate_file_naming.py
            displayName: 'Validate file naming conventions'

          - script: |
              echo "Validating rule metadata..."
              python scripts/validate_rule_metadata.py
            displayName: 'Validate rule metadata'

          - script: |
              echo "Validating detection quality..."
              python scripts/validate_detection_quality.py
            displayName: 'Validate detection quality'

          - script: |
              echo "Validating schemas..."
              python scripts/validate_schema.py
            displayName: 'Validate schemas'

          - script: |
              echo "Validating references..."
              python scripts/validate_links.py
            displayName: 'Validate references'

          - script: |
              echo "Validating spelling..."
              python scripts/validate_spelling.py
            displayName: 'Validate spelling'

          - script: |
              echo "Validating repository structure..."
              python scripts/validate_repo_structure.py
            displayName: 'Validate repository structure'

          - script: pytest -q
            displayName: 'Run unit tests'

          - script: |
              echo "Validating versioning..."
              git fetch origin $(System.PullRequest.TargetBranch) --depth=1
              export BASE_REF="$(System.PullRequest.TargetBranch)"
              python scripts/validate_versions.py
            displayName: 'Validate versioning'
            condition: eq(variables['Build.Reason'], 'PullRequest')
