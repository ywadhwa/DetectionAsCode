# Main Azure Pipelines configuration
# Uses modular templates for maintainability and reusability

# Trigger on detection rule changes (automatic)
trigger:
  branches:
    include:
      - main
      - dev/*
  paths:
    include:
      - sigma-rules/**

# PR validation for both rules and pipeline changes
pr:
  branches:
    include:
      - main
      - dev/*
  paths:
    include:
      - sigma-rules/**
      - scripts/**
      - azure-pipelines.yml
      - azure-pipelines/**

variables:
  pythonVersion: '3.11'
  # Pool configuration for self-hosted Windows agent
  # Using 'Default' agent pool
  agentPoolName: 'Default'

# Include all stage templates
stages:
  - template: azure-pipelines/templates/stages/lint-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT

  - template: azure-pipelines/templates/stages/convert-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Lint

  - template: azure-pipelines/templates/stages/report-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert

  - template: azure-pipelines/templates/stages/docs-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Report

  # Test Splunk queries (only on dev/* and main branches)
  - template: azure-pipelines/templates/stages/test-splunk-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert
      splunkHost: 'localhost'
      splunkPort: '8089'
      splunkUsername: 'admin'
      splunkPassword: $(SPLUNK_PASSWORD)
      splunkIndex: 'test_data'

  # Test KQL queries against Azure Data Explorer (only on dev/* and main branches)
  - template: azure-pipelines/templates/stages/test-kql-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert
      kustoCluster: $(KUSTO_CLUSTER)
      kustoDatabase: $(KUSTO_DATABASE)
      kustoToken: $(KUSTO_TOKEN)
      kustoTenantId: $(KUSTO_TENANT_ID)
      kustoClientId: $(KUSTO_CLIENT_ID)
      kustoClientSecret: $(KUSTO_CLIENT_SECRET)
      kustoUseManagedIdentity: $(KUSTO_USE_MANAGED_IDENTITY)
      kustoQueryTimeout: $(KUSTO_QUERY_TIMEOUT)
      kustoRowLimit: $(KUSTO_ROW_LIMIT)
