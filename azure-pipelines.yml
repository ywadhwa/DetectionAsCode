# Main Azure Pipelines configuration
# Uses modular templates for maintainability and reusability

trigger:
  branches:
    include:
      - master
      - dev
      - staging
  paths:
    include:
      - sigma-rules/**
      - azure-pipelines.yml
      - azure-pipelines/**
      - content-packs/**
      - schemas/**
      - templates/**
      - config/**
      - scripts/**
      - deployments/**

pr:
  branches:
    include:
      - master
      - dev
      - staging
  paths:
    include:
      - sigma-rules/**
      - content-packs/**
      - schemas/**
      - templates/**
      - config/**
      - scripts/**
      - deployments/**

variables:
  pythonVersion: '3.11'
  # Pool configuration for self-hosted Windows agent
  # Change 'Default' to your actual agent pool name
  agentPoolName: 'Default'

# Include all stage templates
stages:
  - template: azure-pipelines/templates/stages/lint-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT

  - template: azure-pipelines/templates/stages/convert-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Lint

  - template: azure-pipelines/templates/stages/report-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert

  - template: azure-pipelines/templates/stages/docs-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Report

  # Test Splunk queries (only on staging and master branches)
  - template: azure-pipelines/templates/stages/test-splunk-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert
      splunkHost: 'localhost'
      splunkPort: '8089'
      splunkUsername: 'admin'
      splunkPassword: 'ChangeMe123!'
      splunkIndex: 'test_data'

  # Test KQL queries against Azure Data Explorer (only on staging and master branches)
  - template: azure-pipelines/templates/stages/test-kql-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Convert
      kustoCluster: $(KUSTO_CLUSTER)
      kustoDatabase: $(KUSTO_DATABASE)
      kustoToken: $(KUSTO_TOKEN)

  # Automatic branch promotion: dev → staging
  # Triggers after Report stage succeeds on dev branch
  - template: azure-pipelines/templates/stages/promote-branch-stage.yml
    parameters:
      sourceBranch: dev
      targetBranch: staging
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Report

  # Automatic branch promotion: staging → master
  # Triggers after TestSplunk and TestKql stages succeed on staging branch
  - template: azure-pipelines/templates/stages/promote-branch-stage.yml
    parameters:
      sourceBranch: staging
      targetBranch: master
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn:
        - TestSplunk
        - TestKql

  - template: azure-pipelines/templates/stages/deploy-stage.yml
    parameters:
      pythonVersion: $(pythonVersion)
      pool:
        name: $(agentPoolName)
        demands:
          - Agent.OS -equals Windows_NT
      dependsOn: Docs
